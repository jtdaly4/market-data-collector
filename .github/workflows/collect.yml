name: collect-market-data

on:
  schedule:
    - cron: "7 * * * *"   # hourly at :07 UTC (offset dodges top-of-hour congestion)
  workflow_dispatch: {}    # manual "Run workflow" button for testing

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect snapshots
        run: python collector.py

      - name: Commit data
        run: |
          git config user.name "collector-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no new data"
          else
            git commit -m "collect: $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main
            git push
          fi
